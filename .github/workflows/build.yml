name: Build
on:
  workflow_call:
    inputs:
      upload-artifact:
        type: boolean
        default: true
      tag-name:
        type: string
        default: "draft"
      channel:
        type: string
        default: "dev"

env:
  IS_GITHUB_ACTIONS: 1
  CHANNEL: "${{ inputs.channel }}"
  FLUTTER_VERSION: '3.38.5'
  UPLOAD_ARTIFACT: "${{ inputs.upload-artifact }}"
  TAG_NAME: "${{ inputs.tag-name }}"
  TARGET_NAME_exe: "ADL-Windows-Setup-x64"
  TARGET_NAME_msix: "ADL-Windows-x64"
  TARGET_NAME_zip: "ADL-Windows-Portable-x64"

jobs:
  test:
    outputs:
      draftBuildCode: ${{ steps.draftBuildCode.outputs.datetime }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2.21.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Prepare
        run: make linux-amd64-prepare
      - name: Test
        run: flutter test

      - name: make draftBuildCode
        id: draftBuildCode
        run: echo "datetime=$(date +'%d.%H.%M')" >> $GITHUB_OUTPUT

  build:
    needs: test
    permissions: write-all
    runs-on: windows-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2.21.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Setup dependencies
        run: |
          make windows-install-deps
          echo "$HOME/.pub-cache/bin" >> $GITHUB_PATH

      - name: Prepare for windows
        run: make windows-prepare

      - name: Build windows
        env:
          SENTRY_DSN: ""
        run: make windows-release

      - name: Copy to out Windows
        shell: pwsh
        run: |
          Get-ChildItem -Path dist -Recurse | Select-Object FullName
          New-Item -ItemType Directory -Path "out" -Force | Out-Null
          $targets = "exe,msix,zip".Split(',')
          foreach ($ext in $targets) {
            $ext = $ext.Trim()
            $key = "TARGET_NAME_$ext"
            $targetName = (Get-Item "env:$key").Value
            $files = Get-ChildItem -Path dist -Recurse -Filter "*.$ext"
            foreach ($file in $files) {
                $destination = Join-Path -Path "out" -ChildPath "$targetName.$ext"
                Move-Item -Path $file.FullName -Destination $destination -Force
            }
          }
          Get-ChildItem -Path out

      - name: Upload Artifact
        if: env.UPLOAD_ARTIFACT == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: ./out
          retention-days: 7

  upload-release:
    permissions: write-all
    if: ${{ inputs.upload-artifact && inputs.tag-name != 'draft' }}
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: windows
          path: ./out/

      - name: Display Files Structure
        run: ls -R ./out

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        if: ${{ success() }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          prerelease: true
          tag_name: ${{ env.TAG_NAME }}
          files: ./out/*