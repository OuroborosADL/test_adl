section: x11
installed_size: 6604
essential: false
icon: assets/images/source/ic_launcher_border.png

# Post-installation tasks:
# 1. Inject StartupWMClass into the system .desktop file for correct icon association
# 2. Remove conflicting adl.desktop files from users' .local directories (cleanup AppImage artifacts)
# 3. Update the desktop database to apply changes immediately
postinstall_scripts:
  - echo "Setting up ADL..."
  - sudo sed -i '/^\[Desktop Entry\]/a StartupWMClass=app.adl.com' "/usr/share/applications/adl.desktop"
  - echo "Search and remove adl.desktop from .local"
  - for user_dir in /home/*; do if [ -f "$user_dir/.local/share/applications/adl.desktop" ]; then rm -f "$user_dir/.local/share/applications/adl.desktop"; echo "Found and removed adl.desktop from $user_dir .local"; fi; done
  - update-desktop-database /usr/share/applications
  - echo "ADL is ready to use :)"

# Post-uninstallation tasks:
# 1. Iterate through all user directories to remove ADL configuration and data
# 2. Clean up root user data to ensure a clean removal
postuninstall_scripts:
  - echo "Removing ADL user data..."
  - for user_dir in /home/*; do if [ -d "$user_dir/.local/share/adl" ]; then rm -rf "$user_dir/.local/share/adl"; echo "Removed data from $user_dir"; fi; done
  - rm -rf /root/.local/share/adl
  - echo "ADL data cleanup complete."

